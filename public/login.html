    <div class="content">
        <h1 class="page-title">Login</h1>

                <div class="input-div">

                    <input type="email" id="ipt_email" class="input">
                </div>
                <div class="input-div">
                    <p>Senha</p>
                    <input type="password" id="ipt_senha" class="input">
                </div>
                <div class="button-div">
                    <button onclick="cadastrar()" class="button button-cadastro-login">Login</button>

                </div>
            </div>
        </div>

<script>
    function entrar() {
        aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "Preencha todos os campos!";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.APELIDO_USUARIO = json.apelido;
                    sessionStorage.ID_USUARIO = json.id_usuario;
                    sessionStorage.NOME_USUARIO = json.nome

                    setTimeout(function () {
                        window.location = "dashboard.html";
                    }, 1000);
                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

    window.onload = function () {
        const theme = sessionStorage.getItem('theme');
        const html = document.querySelector('html');

        toggleTheme(theme)
    };
</script>
