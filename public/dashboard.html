<script>
    function redirecionarNovoPost() {
        window.location = "novopost.html";
    }

    Chart.defaults.font.size = 18;

    window.graficos = [];

    function obterDados(id_grafico, url_api, rotulo, legenda, accent, muted, grid_color, tipo) {

        const grafico = document.getElementById(id_grafico);
        let rotulos = [];
        let dados = [];
        let media = 0;

        fetch(`/posts/${url_api}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idUsuario: sessionStorage.ID_USUARIO
            })
        }).then(function (resposta) {
            console.log(`ESTOU NO THEN DO obterDados() do endpoint ${url_api}!`);

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));

                    if (json == null) {
                        dashboard.innerHTML = `
                            <div class="sem-posts">
                                <img src="./assets/imgs/left-art-${sessionStorage.theme}.png" alt="A criação de Adão ASCII" id="mao-esquerda">
                                <div class="dashboard-vazio">
                                    <p><i>Ainda sem dados por aqui! <br> Que tal começar com um novo post?</i></p>
                                    <button onclick="redirecionarNovoPost()">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path
                                                d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                            <path d="M12 8V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                            <path d="M8 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                                stroke-linejoin="round" />
                                        </svg>
                                        Novo post
                                    </button>
                                </div>
                                <img src="./assets/imgs/right-art-${sessionStorage.theme}.png" alt="A criação de Adão ASCII" id="mao-direita">
                            </div>
                        `
                    } else {
                        for (let i = 0; i < json.length; i++) {
                            rotulos.push(json[i][rotulo]);
                            dados.push(json[i].contagem);
                            media += json[i].contagem;
                        }
                        media = Math.round(media / json.length);

                        tipo == "barra" ?
                            renderizarGraficoBarra(media, grafico, rotulos, dados, legenda, accent, muted, grid_color) :
                            renderizarGraficoPizza(grafico, rotulos, dados, accent, muted);
                    }

                });

            } else {
                console.log(`Houve um erro ao obter os dados do endpoint ${url_api}!`);

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }
        }).catch(function (erro) {
            console.log(erro);
        })
    }

    function renderizarGraficoPizza(grafico, rotulos, dados, accent, muted) {
        const graph = new Chart(grafico, {
            type: "pie",
            data: {
                labels: rotulos,
                datasets: [
                    {
                        data: dados,
                        borderWidth: 2,
                        borderColor: accent,
                        backgroundColor: muted
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                    }
                }
            }
        });

        window.graficos.push(graph);
    }

    function renderizarGraficoBarra(media, grafico, rotulos, dados, legenda, accent, muted, grid_color) {
        const graph = new Chart(grafico, {
            type: "bar",
            data: {
                labels: rotulos,
                datasets: [
                    {
                        label: legenda,
                        data: dados,
                        borderWidth: 2,
                        borderColor: accent,
                        backgroundColor: muted
                    },
                ],
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    x: {
                        grid: {
                            color: grid_color
                        }
                    },
                    y: {
                        grid: {
                            color: grid_color
                        },
                        ticks: {
                            precision: 0,
                            stepSize: 1
                        },
                        beginAtZero: true
                    },
                },
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                    },
                    annotation: {
                        annotations: {
                            kpi: {
                                type: "line",
                                yMin: media,
                                yMax: media,
                                borderColor: "#B14A9B",
                                borderWidth: 2,
                                label: {
                                    display: true,
                                    content: `Média de posts: ${media}`,
                                    backgroundColor: "transparent",
                                    color: "#B14A9B",
                                    position: "center",
                                    yAdjust: -10
                                }
                            }
                        }
                    }
                }
            }
        });

        window.graficos.push(graph);
    }

    function obterCorCSS(variavel) {
        return getComputedStyle(document.documentElement).getPropertyValue(variavel);
    }

    window.onload = function () {
        const theme = sessionStorage.getItem('theme');
        const html = document.querySelector('html');

        let accentGrafico1 = obterCorCSS('--accent');
        let mutedGrafico1 = obterCorCSS('--muted');
        let gridGrafico1 = obterCorCSS('--border');

        let accentGrafico2 = [obterCorCSS('--accent-purple'), obterCorCSS('--accent-pink')];
        let mutedGrafico2 = [obterCorCSS('--muted-purple'), obterCorCSS('--muted-pink')];

        let accentGrafico3 = [obterCorCSS('--accent-blue'), obterCorCSS('--accent-green')];
        let mutedGrafico3 = [obterCorCSS('--muted-blue'), obterCorCSS('--muted-green')];

        toggleTheme(theme);
        validarSessao();
        obterDados("grafico-posts-por-dia", "meuspostspordia", "data", "Quantidade de posts", accentGrafico1, mutedGrafico1, gridGrafico1, "barra");
        obterDados("grafico-visibilidade-posts", "visibilidademeusposts", "visibilidade", null, accentGrafico2, mutedGrafico2, null, "pizza");
        obterDados("grafico-status-posts", "statusmeusposts", "status_postagem", null, accentGrafico3, mutedGrafico3, null, "pizza");
    };
</script>
