<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar-se</title>
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
    <div>
        <div>
            <img src="" alt="">
            <div>
                <p>Nome</p>
                <input type="text" id="ipt_nome">
            </div>
            <div>
                <p>Apelido</p>
                <input type="text" id="ipt_apelido">
            </div>
            <div>
                <p>E-mail</p>
                <input type="text" id="ipt_email">
            </div>
            <div>
                <p>Senha</p>
                <input type="text" id="ipt_senha">
            </div>
            <div>
                <p>Confirme a senha</p>
                <input type="text" id="ipt_confirmar_senha">
            </div>
            <div>
                <button onclick="cadastrar()">Cadastrar-se</button>
                <p>Já possui uma conta? <a href="">Faça login!</a></p>
            </div>
        </div>
    </div>
    <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
        </div>
    </div>
</body>

</html>
<script>
    function cadastrar() {
        var nomeVar = ipt_nome.value;
        var apelidoVar = ipt_apelido.value;
        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;
        var confirmarSenhaVar = ipt_confirmar_senha.value;

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                apelidoServer: apelidoVar,
                emailServer: emailVar,
                senhaServer: senhaVar,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    cardErro.style.display = "block";

                    mensagem_erro.innerHTML =
                        "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");

                    limparFormulario();
                    finalizarAguardar();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
                finalizarAguardar();
            });

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none";
    }
</script>
